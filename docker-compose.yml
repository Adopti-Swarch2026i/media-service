version: "3.9"

services:
  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: media-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - media-net

  # ── RabbitMQ ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: media-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: adopti
      RABBITMQ_DEFAULT_PASS: rabbitmq_secret
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - media-net

  # ── Media Service ─────────────────────────────────────
  media-service:
    build: .
    container_name: media-service
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://adopti:rabbitmq_secret@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    networks:
      - media-net

volumes:
  redis-data:
  rabbitmq-data:

networks:
  media-net:
    driver: bridge
