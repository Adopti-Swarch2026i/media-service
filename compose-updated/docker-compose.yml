networks:
  adopti-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  elasticsearch-data:
  postgres-notifications-data:

services:

  # ──────────────────────────────────────────────────────────────────────────
  # INFRAESTRUCTURA — datastores y broker
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Base de datos relacional (pets-service) ----
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: petsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Base de datos relacional (notification-service) ----
  postgres-notifications:
    image: postgres:15
    environment:
      POSTGRES_DB: notificationsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificationsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Message Broker (RabbitMQ) ----
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: adopti
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Cache + Async Queue (Redis) ----
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Search Engine (Elasticsearch) ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - adopti-net

  # ──────────────────────────────────────────────────────────────────────────
  # SERVICIOS LÓGICOS
  # ──────────────────────────────────────────────────────────────────────────

  # ---- Pets Service (FastAPI / Python) ----
  pets-service:
    build: ../pets-service/pets-service
    env_file:
      - ../pets-service/pets-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/petsdb
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
      - RABBITMQ_URL=amqp://adopti:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
    volumes:
      - ../pets-service/firebase-config:/firebase-config
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Chat Service (Spring Boot / Java) ----
  chat-service:
    build: ../chat-service
    env_file:
      - ../chat-service/.env
    environment:
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-credentials.json
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=adopti
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq_secret}
    volumes:
      - ../chat-service/src/main/resources/adoptiswarch-dc4da-firebase-adminsdk-fbsvc-21e2ea6cae.json:/app/firebase-credentials.json:ro
    expose:
      - "8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - --header='Content-Type: application/json' --post-data='{\"query\":\"{__typename}\"}' http://localhost:8081/graphql | grep -q __typename"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Notification Service (Go) ----
  notification-service:
    build: ../notification-service
    env_file:
      - ../notification-service/.env
    environment:
      - PORT=8082
      - RABBITMQ_URL=amqp://adopti:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - POSTGRES_DSN=postgres://postgres:password@postgres-notifications:5432/notificationsdb?sslmode=disable
      - LOG_LEVEL=info
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
      - FIREBASE_CREDENTIALS=/app/firebase-credentials.json
    volumes:
      - ../notification-service/firebase-credentials.json:/app/firebase-credentials.json:ro
    expose:
      - "8082"
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Matching Service (Kotlin / Spring Boot) ----
  matching-service:
    build: ../matching-service
    env_file:
      - ../matching-service/.env
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_SCHEME=http
      - ELASTICSEARCH_INDEX=pets
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=adopti
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq_secret}
      - MATCH_SCORE_THRESHOLD=0.3
      - MATCH_MAX_DAYS=90
      - MATCH_MAX_RESULTS=20
    expose:
      - "8083"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Media Service (Node.js / TypeScript) ----
  media-service:
    build: ../media-service
    env_file:
      - ../media-service/.env
    environment:
      - PORT=8084
      - HOST=0.0.0.0
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://adopti:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672/
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
    volumes:
      - ../media-service/firebase-credentials.json:/app/firebase-credentials.json:ro
    expose:
      - "8084"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/api/media/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - adopti-net

  # ──────────────────────────────────────────────────────────────────────────
  # PRESENTACIÓN Y GATEWAY
  # ──────────────────────────────────────────────────────────────────────────

  # ---- API Gateway (Nginx) ----
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      pets-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      matching-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - adopti-net

  # ---- Frontend (React SPA servida por Nginx) ----
  frontend:
    build: ../frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - adopti-net
